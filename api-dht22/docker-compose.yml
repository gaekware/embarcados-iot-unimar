version: '3.8'

services:
  app:
    build: .
    container_name: telemetry_app
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: telemetry_db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d telemetry_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
