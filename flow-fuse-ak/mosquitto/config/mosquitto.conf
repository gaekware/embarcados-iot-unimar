# ─────────────────────────────────────────
# Eclipse Mosquitto — Configuração
# ─────────────────────────────────────────

# Listener MQTT — aceita conexões de qualquer interface (0.0.0.0)
listener 1883 0.0.0.0
protocol mqtt

# Listener WebSocket — usado pelo browser / Node-RED via WS
listener 9001 0.0.0.0
protocol websockets

# Permite conexões sem autenticação (ambiente de lab/dev)
allow_anonymous true

# Persistência de mensagens retain
persistence true
persistence_location /mosquitto/data/

# Logs
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
